name: Sync Set 3 Spoilers

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Sync spoiler data
        run: npm run sync:set3-spoilers

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No spoiler changes found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/set3Spoilers.json public/set3-spoilers
          git commit -m "Sync Set 3 spoilers"
          git push
